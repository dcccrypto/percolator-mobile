name: Android APK Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage --watchAll=false

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          EXPO_PUBLIC_HELIUS_API_KEY: ${{ secrets.EXPO_PUBLIC_HELIUS_API_KEY }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: percolator-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode release keystore
        if: env.PERCOLATOR_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.PERCOLATOR_KEYSTORE_BASE64 }}" | base64 --decode > android/app/percolator-release.keystore
        env:
          PERCOLATOR_KEYSTORE_BASE64: ${{ secrets.PERCOLATOR_KEYSTORE_BASE64 }}

      - name: Grant Gradle permissions
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          EXPO_PUBLIC_HELIUS_API_KEY: ${{ secrets.EXPO_PUBLIC_HELIUS_API_KEY }}
          PERCOLATOR_KEYSTORE_PASSWORD: ${{ secrets.PERCOLATOR_KEYSTORE_PASSWORD }}
          PERCOLATOR_KEY_ALIAS: ${{ secrets.PERCOLATOR_KEY_ALIAS }}
          PERCOLATOR_KEY_PASSWORD: ${{ secrets.PERCOLATOR_KEY_PASSWORD }}

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: percolator-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Percolator ${{ github.ref_name }}
          body: |
            ## Percolator Mobile ${{ github.ref_name }}

            ### Installation
            1. Download `app-release.apk` below
            2. Enable "Install unknown apps" on your Android device
            3. **Important**: If you have a previous version installed, uninstall it first (signature changed)
            4. Open the APK and tap Install

            ### Package ID
            `com.percolator.seeker` (updated from `com.percolatormobile` in v1.0.1)

            ### Requirements
            - Android 7.0+ (SDK 24)
            - Solana wallet app (Phantom, Solflare, or Seed Vault on Seeker)
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
